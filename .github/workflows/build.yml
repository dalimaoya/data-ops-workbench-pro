name: Build & Package

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g. 5.0.0)'
        required: true
        default: '5.0.0'
      build_linux:
        description: 'Build Linux'
        type: boolean
        default: true
      build_windows:
        description: 'Build Windows'
        type: boolean
        default: true

jobs:
  build-linux:
    if: ${{ inputs.build_linux }}
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Sync version
        run: echo "${{ inputs.version }}" > version.txt

      - name: Install backend dependencies
        run: |
          cd backend
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Install frontend dependencies & build
        run: |
          cd frontend
          pnpm install --no-frozen-lockfile
          pnpm run build

      - name: Build backend with PyInstaller
        run: |
          cd backend
          pyinstaller --onedir \
            --name app \
            --add-data "app/i18n:app/i18n" \
            --add-data "app/plugins:app/plugins" \
            --collect-submodules app \
            --collect-submodules app.routers \
            --collect-submodules app.utils \
            --collect-submodules app.ai \
            --collect-submodules app.services \
            --hidden-import email.mime \
            --hidden-import email.mime.text \
            --hidden-import email.mime.multipart \
            --hidden-import uvicorn.logging \
            --hidden-import uvicorn.loops.auto \
            --hidden-import uvicorn.protocols.http.auto \
            --hidden-import uvicorn.protocols.websockets.auto \
            --hidden-import uvicorn.lifespan.on \
            --hidden-import sqlalchemy.dialects.sqlite \
            --hidden-import sqlalchemy.dialects.mysql \
            --hidden-import sqlalchemy.dialects.postgresql \
            --hidden-import pymysql \
            --hidden-import cryptography \
            --hidden-import jose \
            --hidden-import httpx \
            --hidden-import openpyxl \
            --hidden-import passlib.handlers.bcrypt \
            --hidden-import passlib.handlers.des_crypt \
            --hidden-import passlib.handlers.pbkdf2 \
            --hidden-import passlib.handlers.sha2_crypt \
            --collect-submodules passlib \
            --collect-submodules fastapi \
            --collect-submodules pydantic \
            app_entry.py

      - name: Package Linux release
        run: |
          VERSION=${{ inputs.version }}
          RELEASE_DIR="data-ops-workbench-v${VERSION}-linux-x64"
          mkdir -p ${RELEASE_DIR}/{server,web,data,logs,backups}

          # --onedir produces dist/app_entry/ folder
          cp -r backend/dist/app ${RELEASE_DIR}/server/app
          chmod +x ${RELEASE_DIR}/server/app/app

          cp -r backend/web/* ${RELEASE_DIR}/web/
          cp start.sh ${RELEASE_DIR}/
          cp version.txt ${RELEASE_DIR}/
          chmod +x ${RELEASE_DIR}/start.sh
          [ -f data/activation_public.pem ] && cp data/activation_public.pem ${RELEASE_DIR}/data/

          tar czf ${RELEASE_DIR}.tar.gz ${RELEASE_DIR}

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-release
          path: data-ops-workbench-v${{ inputs.version }}-linux-x64.tar.gz
          retention-days: 30

  build-windows:
    if: ${{ inputs.build_windows }}
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Sync version
        run: echo "${{ inputs.version }}" > version.txt

      - name: Install backend dependencies
        run: |
          cd backend
          pip install -r requirements.txt
          pip install pyinstaller pywebview pystray Pillow

      - name: Install frontend dependencies & build
        run: |
          cd frontend
          pnpm install --no-frozen-lockfile
          pnpm run build

      - name: Build backend with PyInstaller
        shell: pwsh
        run: |
          cd backend
          # Use --onedir for reliability (--onefile can be blocked by antivirus)
          # Entry point is app_entry.py (not app/main.py) - it starts uvicorn
          pyinstaller --onedir `
            --name app `
            --add-data "app/i18n;app/i18n" `
            --add-data "app/plugins;app/plugins" `
            --collect-submodules app `
            --collect-submodules app.routers `
            --collect-submodules app.utils `
            --collect-submodules app.ai `
            --collect-submodules app.services `
            --hidden-import email.mime `
            --hidden-import email.mime.text `
            --hidden-import email.mime.multipart `
            --hidden-import uvicorn.logging `
            --hidden-import uvicorn.loops.auto `
            --hidden-import uvicorn.protocols.http.auto `
            --hidden-import uvicorn.protocols.websockets.auto `
            --hidden-import uvicorn.lifespan.on `
            --hidden-import sqlalchemy.dialects.sqlite `
            --hidden-import sqlalchemy.dialects.mysql `
            --hidden-import sqlalchemy.dialects.postgresql `
            --hidden-import pymysql `
            --hidden-import cryptography `
            --hidden-import jose `
            --hidden-import httpx `
            --hidden-import openpyxl `
            --hidden-import passlib.handlers.bcrypt `
            --hidden-import passlib.handlers.des_crypt `
            --hidden-import passlib.handlers.pbkdf2 `
            --hidden-import passlib.handlers.sha2_crypt `
            --collect-submodules passlib `
            --collect-submodules fastapi `
            --collect-submodules pydantic `
            app_entry.py

      - name: Build launcher with PyInstaller
        shell: pwsh
        run: |
          # Verify pywebview is importable before build
          python -c "import webview; print('webview OK:', webview.__version__)"
          python -c "import pystray; print('pystray OK')"

          pyinstaller --onefile `
            --name DataOpsWorkbench `
            --hidden-import webview `
            --hidden-import webview.platforms.edgechromium `
            --hidden-import webview.platforms.winforms `
            --hidden-import webview.platforms.cef `
            --hidden-import pystray `
            --hidden-import pystray._win32 `
            --hidden-import PIL `
            --hidden-import PIL.Image `
            --hidden-import PIL.ImageDraw `
            --hidden-import PIL.ImageFont `
            --collect-all webview `
            --collect-submodules pystray `
            --collect-submodules PIL `
            launcher.py

      - name: Package Windows release
        shell: pwsh
        run: |
          $VERSION = "${{ inputs.version }}"
          $RELEASE_DIR = "data-ops-workbench-v${VERSION}-win-x64"
          New-Item -ItemType Directory -Force -Path "$RELEASE_DIR/server"
          New-Item -ItemType Directory -Force -Path "$RELEASE_DIR/web"
          New-Item -ItemType Directory -Force -Path "$RELEASE_DIR/data"
          New-Item -ItemType Directory -Force -Path "$RELEASE_DIR/logs"
          New-Item -ItemType Directory -Force -Path "$RELEASE_DIR/backups"

          # --onedir produces dist/app_entry/ folder (named after entry script)
          Copy-Item -Recurse "backend/dist/app" "$RELEASE_DIR/server/app"
          Copy-Item "dist/DataOpsWorkbench.exe" "$RELEASE_DIR/DataOpsWorkbench.exe"
          Copy-Item -Recurse "backend/web/*" "$RELEASE_DIR/web/"
          Copy-Item "start.bat" "$RELEASE_DIR/"
          Copy-Item "version.txt" "$RELEASE_DIR/"
          if (Test-Path "data/activation_public.pem") {
            Copy-Item "data/activation_public.pem" "$RELEASE_DIR/data/"
          }

          # Create zip (portable version)
          Compress-Archive -Path $RELEASE_DIR -DestinationPath "${RELEASE_DIR}.zip"

      - name: Build Inno Setup installer
        shell: pwsh
        run: |
          $VERSION = "${{ inputs.version }}"
          $RELEASE_DIR = "data-ops-workbench-v${VERSION}-win-x64"

          # Install Inno Setup
          choco install innosetup -y --no-progress 2>$null
          $env:PATH += ";C:\Program Files (x86)\Inno Setup 6"

          # Generate setup.iss dynamically
          @"
          [Setup]
          AppName=数据运维工作台
          AppVersion=$VERSION
          AppPublisher=dalimaoya
          AppPublisherURL=https://github.com/dalimaoya/data-ops-workbench
          DefaultDirName={autopf}\DataOpsWorkbench
          DefaultGroupName=数据运维工作台
          OutputDir=.
          OutputBaseFilename=DataOpsWorkbench-v${VERSION}-Setup
          Compression=lzma2/ultra64
          SolidCompression=yes
          PrivilegesRequired=lowest
          DisableProgramGroupPage=yes
          UninstallDisplayName=数据运维工作台

          [Files]
          Source: "$RELEASE_DIR\*"; DestDir: "{app}"; Flags: ignoreversion recursesubdirs createallsubdirs

          [Icons]
          Name: "{group}\数据运维工作台"; Filename: "{app}\DataOpsWorkbench.exe"
          Name: "{group}\启动服务"; Filename: "{app}\start.bat"
          Name: "{group}\卸载"; Filename: "{uninstallexe}"
          Name: "{autodesktop}\数据运维工作台"; Filename: "{app}\DataOpsWorkbench.exe"; Tasks: desktopicon

          [Tasks]
          Name: "desktopicon"; Description: "创建桌面快捷方式"; GroupDescription: "附加选项:"

          [Registry]
          Root: HKCU; Subkey: "Software\DataOpsWorkbench"; ValueType: string; ValueName: "InstallPath"; ValueData: "{app}"
          Root: HKCU; Subkey: "Software\DataOpsWorkbench"; ValueType: string; ValueName: "Version"; ValueData: "$VERSION"

          [Run]
          Filename: "{app}\DataOpsWorkbench.exe"; Description: "启动数据运维工作台"; Flags: nowait postinstall skipifsilent
          "@ | Out-File -Encoding UTF8 "setup_gen.iss"

          # Build installer
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" "setup_gen.iss"

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-release
          path: |
            data-ops-workbench-v${{ inputs.version }}-win-x64.zip
            DataOpsWorkbench-v${{ inputs.version }}-Setup.exe
          retention-days: 30

  create-release:
    needs: [build-linux, build-windows]
    if: always() && (needs.build-linux.result == 'success' || needs.build-windows.result == 'success')
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ inputs.version }}
          name: v${{ inputs.version }}
          body: |
            ## 数据运维工作台 v${{ inputs.version }}

            ### 下载
            - **Linux**: `data-ops-workbench-v${{ inputs.version }}-linux-x64.tar.gz`
            - **Windows**: `data-ops-workbench-v${{ inputs.version }}-win-x64.zip`

            ### 安装
            - Linux: 解压后运行 `./start.sh`
            - Windows: 解压后运行 `DataOpsWorkbench.exe` 或 `start.bat`
            - 访问 `http://localhost:9590`
            - 默认账号: admin / dalimaoya
          files: |
            linux-release/*
            windows-release/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
